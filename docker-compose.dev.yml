services:
  admin:
    environment:
      - DUCKWAY_DEV=1
      - DUCKWAY_WEB_DIR=/web
    ports:
      - "127.0.0.1:9099:9091"
    volumes:
      - ./web:/web:ro
    profiles: ["split"]

  gateway:
    profiles: ["split"]

  # Combined mode (default for dev)
  server:
    environment:
      - DUCKWAY_DEV=1
      - DUCKWAY_DATA_DIR=/data
      - DUCKWAY_LISTEN=:8080
      - DUCKWAY_WEB_DIR=/web
    ports:
      - "127.0.0.1:9090:8080"
    volumes:
      - ./web:/web:ro
    profiles: ["combined"]
