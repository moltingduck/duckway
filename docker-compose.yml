# Duckway Docker Compose
#
# Profiles:
#   combined              — admin + gateway on one port (localhost)
#   split                 — admin + gateway on separate ports (localhost)
#   tailscale             — split + Tailscale sidecars (HTTPS, no exposed ports)
#   tailscale-combined    — combined + Tailscale sidecar (HTTPS, no exposed ports)
#
# Usage:
#   docker compose --profile combined up -d                        # dev: combined
#   docker compose --profile split up -d                           # dev: split
#   docker compose --profile tailscale up -d                       # prod: split + Tailscale
#   docker compose --profile tailscale-combined up -d              # prod: combined + Tailscale
#
# Naming convention:
#   {app}              — app with localhost ports (dev)
#   {app}-tailscale    — app sharing network with Tailscale sidecar (prod)
#   tailscale-{app}    — the Tailscale sidecar container itself

services:
  # ============================================================
  # Combined mode (localhost)
  # ============================================================
  server:
    build: { context: ., target: server }
    container_name: duckway-server
    ports:
      - "127.0.0.1:${DUCKWAY_PORT:-8080}:8080"
    volumes:
      - duckway-data:/data
    restart: unless-stopped
    environment:
      - DUCKWAY_DATA_DIR=/data
      - DUCKWAY_LISTEN=:8080
    profiles: ["combined"]

  # ============================================================
  # Combined mode + Tailscale
  # ============================================================
  server-tailscale:
    build: { context: ., target: server }
    container_name: duckway-server
    network_mode: "service:tailscale-server"
    volumes:
      - duckway-data:/data
    restart: unless-stopped
    environment:
      - DUCKWAY_DATA_DIR=/data
      - DUCKWAY_LISTEN=:8080
    depends_on:
      - tailscale-server
    profiles: ["tailscale-combined"]

  tailscale-server:
    image: tailscale/tailscale@sha256:dbeff02d2337344b351afac203427218c4d0a06c43fc10a865184063498472a6
    container_name: duckway-tailscale-server
    hostname: ${TS_HOSTNAME:-duckway}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/ts-combined.json
      - TS_USERSPACE=true
    volumes:
      - tailscale-server-state:/var/lib/tailscale
      - ./tailscale:/config:ro
    restart: unless-stopped
    profiles: ["tailscale-combined"]

  # ============================================================
  # Split mode (localhost)
  # ============================================================
  admin:
    build: { context: ., target: admin }
    container_name: duckway-admin
    ports:
      - "127.0.0.1:${DUCKWAY_ADMIN_PORT:-9091}:9091"
    volumes:
      - duckway-data:/data
    restart: unless-stopped
    environment:
      - DUCKWAY_DATA_DIR=/data
      - DUCKWAY_ADMIN_LISTEN=:9091
    command: ["--data", "/data", "--port", "9091"]
    profiles: ["split"]

  gateway:
    build: { context: ., target: gateway }
    container_name: duckway-gateway
    ports:
      - "127.0.0.1:${DUCKWAY_GATEWAY_PORT:-8080}:8080"
    volumes:
      - duckway-data:/data
    restart: unless-stopped
    environment:
      - DUCKWAY_DATA_DIR=/data
      - DUCKWAY_GATEWAY_LISTEN=:8080
    profiles: ["split"]

  # ============================================================
  # Split mode + Tailscale
  # ============================================================
  admin-tailscale:
    build: { context: ., target: admin }
    container_name: duckway-admin
    network_mode: "service:tailscale-admin"
    volumes:
      - duckway-data:/data
    restart: unless-stopped
    environment:
      - DUCKWAY_DATA_DIR=/data
      - DUCKWAY_ADMIN_LISTEN=:9091
    command: ["--data", "/data", "--port", "9091"]
    depends_on:
      - tailscale-admin
    profiles: ["tailscale"]

  gateway-tailscale:
    build: { context: ., target: gateway }
    container_name: duckway-gateway
    network_mode: "service:tailscale-gateway"
    volumes:
      - duckway-data:/data
    restart: unless-stopped
    environment:
      - DUCKWAY_DATA_DIR=/data
      - DUCKWAY_GATEWAY_LISTEN=:8080
    command: ["--data", "/data", "--port", "8080"]
    depends_on:
      - tailscale-gateway
    profiles: ["tailscale"]

  tailscale-admin:
    image: tailscale/tailscale@sha256:dbeff02d2337344b351afac203427218c4d0a06c43fc10a865184063498472a6
    container_name: duckway-tailscale-admin
    hostname: ${TS_HOSTNAME:-duckway}-admin
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/ts-admin.json
      - TS_USERSPACE=true
    volumes:
      - tailscale-admin-state:/var/lib/tailscale
      - ./tailscale:/config:ro
    restart: unless-stopped
    profiles: ["tailscale"]

  tailscale-gateway:
    image: tailscale/tailscale@sha256:dbeff02d2337344b351afac203427218c4d0a06c43fc10a865184063498472a6
    container_name: duckway-tailscale-gateway
    hostname: ${TS_HOSTNAME:-duckway}-gw
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/ts-gateway.json
      - TS_USERSPACE=true
    volumes:
      - tailscale-gateway-state:/var/lib/tailscale
      - ./tailscale:/config:ro
    restart: unless-stopped
    profiles: ["tailscale"]

  # ============================================================
  # Client (always available)
  # ============================================================
  client:
    build: { context: ., target: client }
    container_name: duckway-client
    restart: unless-stopped
    environment:
      - DUCKWAY_SERVER=http://gateway:8080

volumes:
  duckway-data:
  tailscale-server-state:
  tailscale-admin-state:
  tailscale-gateway-state:
