services:
  server:
    build:
      context: .
      target: server
    container_name: duckway-server
    ports:
      - "${DUCKWAY_PORT:-8080}:8080"
    volumes:
      - duckway-data:/data
    restart: unless-stopped
    environment:
      - DUCKWAY_DATA_DIR=/data
      - DUCKWAY_LISTEN=:8080

  client:
    build:
      context: .
      target: client
    container_name: duckway-client
    depends_on:
      - server
    restart: unless-stopped
    environment:
      - DUCKWAY_SERVER=http://server:8080

volumes:
  duckway-data:
